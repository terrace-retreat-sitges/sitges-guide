<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Terrace Retreat · Sitges Guide</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f7efe5;
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .page {
      width: 100%;
      max-width: 820px;
      position: relative;
      background: #f7efe5;
      line-height: 0;
    }

    .page img {
      width: 100%;
      height: auto;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }

    .lang-link {
      touch-action: manipulation;
      z-index: 20;
      z-index: 10;
      position: absolute;
      position: absolute;
      display: block;
      left: 22.5%;
      width: 55%;
      height: 5.2%;
      border-radius: 20px;
      text-indent: -9999px;
      overflow: hidden;
      -webkit-tap-highlight-color: rgba(7,63,45,.18);
    }

    .lang-link:focus-visible {
      outline: 3px solid #0b3b2b;
      outline-offset: 4px;
      background: rgba(255,255,255,.18);
    }

    /* Percentage placement is relative to the actual image, so it stays aligned on laptop and mobile */
    .spanish { top: 68.8%; }
    .english { top: 76.4%; }
    .french  { top: 84.0%; }
  </style>
</head>
<body>
  <main class="page" aria-label="Terrace Retreat Sitges language selection">
    <img src="assets/language-homepage-background.jpg" alt="Terrace Retreat Sitges guide. Choose Spanish, English or French." />

    <a class="lang-link spanish" href="./es/index.html" aria-label="Open Spanish guide">Spanish</a>
    <a class="lang-link english" href="./en/index.html" aria-label="Open English guide">English</a>
    <a class="lang-link french" href="./fr/index.html" aria-label="Open French guide">French</a>
  </main>
</body>
</html>
