<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Terrace Retreat · Guía de la casa</title>
<style>
:root{
  --bg:#f7efe5;
  --green:#073f2d;
  --line:#d8c7b4;
  --card:#fffaf3;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--bg);
  color:var(--green);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
.back{
  position:fixed;
  top:48px;
  left:14px;
  z-index:50;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:44px;
  padding:10px 16px;
  border-radius:999px;
  background:rgba(255,250,243,.94);
  backdrop-filter:blur(10px);
  border:1px solid var(--line);
  color:var(--green);
  text-decoration:none;
  font-weight:900;
  box-shadow:0 10px 24px rgba(0,0,0,.08);
}
.house-shell{
  max-width:1050px;
  margin:0 auto;
  padding:72px 16px 50px;
}
.house-title{
  text-align:center;
  margin:0 0 18px;
}
.house-title h1{
  margin:0;
  font-family:Georgia,"Times New Roman",serif;
  text-transform:uppercase;
  letter-spacing:3px;
  font-size:clamp(34px,7vw,72px);
  line-height:1;
}
.house-title p{
  margin:8px 0 0;
  color:#9a6046;
  font-size:18px;
}
.house-pages{
  display:grid;
  gap:24px;
}
.house-page{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 14px 34px rgba(0,0,0,.08);
}
.house-page img{
  width:100%;
  display:block;
  cursor:zoom-in;
}
.zoom-modal{
  position:fixed;
  inset:0;
  z-index:99999;
  background:rgba(7,20,16,.94);
  display:none;
  align-items:center;
  justify-content:center;
  overflow:auto;
  touch-action:pan-x pan-y pinch-zoom;
  padding:48px 12px 20px;
}
.zoom-modal.open{display:flex}
.zoom-modal img{
  max-width:none;
  width:100%;
  height:auto;
  transform-origin:center center;
  cursor:zoom-out;
  border-radius:12px;
}
.zoom-close{
  position:fixed;
  top:12px;
  right:12px;
  z-index:100000;
  width:44px;
  height:44px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.35);
  background:rgba(255,250,243,.92);
  color:#073f2d;
  font-size:28px;
  line-height:1;
  font-weight:800;
}
@media(max-width:760px){
  .house-shell{
    padding:64px 0 76px;
  }
  .house-title{
    padding:0 16px;
  }
  .house-pages{
    display:flex;
    overflow-x:auto;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
    gap:0;
  }
  .house-page{
    flex:0 0 100%;
    scroll-snap-align:start;
    border-radius:0;
    border-left:0;
    border-right:0;
    box-shadow:none;
    background:#fff;
  }
  .zoom-modal img{
    width:160%;
    max-width:none;
  }
}

.language-switch-btn{position:fixed;top:48px;right:14px;z-index:50;display:inline-flex;align-items:center;justify-content:center;min-height:58px;padding:16px 24px;border-radius:999px;background:rgba(255,250,243,.94);backdrop-filter:blur(10px);border:1px solid #d8c7b4;color:#073f2d;text-decoration:none;font-weight:900;font-size:18px;box-shadow:0 10px 24px rgba(0,0,0,.08)}
@media(max-width:420px){.language-switch-btn{top:56px;padding:16px 20px;font-size:17px;min-height:60px}}

</style>
</head>
<body>
<a class="language-switch-btn" href="../index.html">🌐 Idioma</a>
<a class="back" href="index.html">← Página principal</a>

<main class="house-shell">
  <header class="house-title">
    <a href="https://maps.google.com/?q=Sitges" target="_blank" style="color:inherit;text-decoration:none;"><h1>Guía de la casa</h1></a>
    <p>Desliza o desplázate por la guía</p>
  </header>

  <div class="house-pages">
    
      <section class="house-page" id="house-1">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-02-contacto-ayuda.jpg" alt="Contacto y ayuda"></a>
      </section>
    
      <section class="house-page" id="house-2">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-03-aire-acondicionado-calefaccion.jpg" alt="Aire acondicionado / Calefacción"></a>
      </section>
    
      <section class="house-page" id="house-3">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-04-tv-smart-tv.jpg" alt="TV – Smart TV LG"></a>
      </section>
    
      <section class="house-page" id="house-4">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-05-ventiladores-techo.jpg" alt="Ventiladores de techo"></a>
      </section>
    
      <section class="house-page" id="house-5">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-06-toldo-automatico.jpg" alt="Toldo automático"></a>
      </section>
    
      <section class="house-page" id="house-6">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-07-cocina-lavavajillas.jpg" alt="Cocina / Lavavajillas"></a>
      </section>
    
      <section class="house-page" id="house-7">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-08-horno.jpg" alt="Horno"></a>
      </section>
    
      <section class="house-page" id="house-8">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-09-lavadora-secadora.jpg" alt="Lavadora / Secadora"></a>
      </section>
    
      <section class="house-page" id="house-9">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-10-aspiradora.jpg" alt="Aspiradora"></a>
      </section>
    
      <section class="house-page" id="house-10">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-11-normas-casa.jpg" alt="Persianas, plantas, basura y normas"></a>
      </section>
    
      <section class="house-page" id="house-11">
        <a href="https://maps.google.com/?q=Sitges" target="_blank"><img src="assets/house-12-checkout-llaves-despedida.jpg" alt="Check-out, llaves y despedida"></a>
      </section>
    
  </div>
</main>

<div class="zoom-modal" id="zoomModal" aria-hidden="true">
  <button class="zoom-close" id="zoomClose" aria-label="Cerrar zoom">×</button>
  <img id="zoomImage" alt="">
</div>

<script>
(function(){
  const modal = document.getElementById('zoomModal');
  const zoomImg = document.getElementById('zoomImage');
  const closeBtn = document.getElementById('zoomClose');

  function openZoom(src, alt){
    zoomImg.src = src;
    zoomImg.alt = alt || '';
    modal.classList.add('open');
    modal.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }

  function closeZoom(){
    modal.classList.remove('open');
    modal.setAttribute('aria-hidden', 'true');
    zoomImg.src = '';
    document.body.style.overflow = '';
  }

  document.querySelectorAll('.house-page img').forEach(img => {
    img.addEventListener('click', () => openZoom(img.src, img.alt));
  });

  closeBtn.addEventListener('click', closeZoom);
  modal.addEventListener('click', (e) => {
    if(e.target === modal || e.target === zoomImg) closeZoom();
  });

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape') closeZoom();
  });
})();
</script>
</body>
</html>
